model:
  name: Qwen/Qwen2.5-7B-Instruct
  max_length: 2048

data:
  train_file: data/example.jsonl
  eval_file: null

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/qwen-sft-lora
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  eval_steps: 200
  bf16: true
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  report_to: none
  seed: 42
